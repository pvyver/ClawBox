<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a class="site-logo" href="{{ '/' | relative_url }}">
        <span class="logo-icon">🦞</span>
        <span class="logo-text">{{ site.title }}</span>
      </a>
      <div id="freshness-badge" class="freshness-badge" title="Data freshness">
        <span class="freshness-dot"></span>
        <span class="freshness-text"><span id="freshness-label">Checking...</span></span>
      </div>
      <nav class="site-nav" aria-label="Main navigation">
        <button class="nav-toggle" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-list">
          <li><a href="{{ '/' | relative_url }}" class="nav-link{% if page.url == '/' %} active{% endif %}">Dashboard</a></li>
          <li><a href="{{ '/health' | relative_url }}" class="nav-link{% if page.url == '/health.html' %} active{% endif %}">Health</a></li>
          <li><a href="{{ '/cron' | relative_url }}" class="nav-link{% if page.url == '/cron.html' %} active{% endif %}" id="nav-cron">Cron Jobs <span class="nav-badge" id="nav-cron-badge"></span></a></li>
          <li><a href="{{ '/token-usage' | relative_url }}" class="nav-link{% if page.url == '/token-usage.html' %} active{% endif %}">Token Usage</a></li>
          <li class="nav-export-item">
            <button id="export-toggle" class="nav-link export-toggle" aria-label="Export" title="Export Dashboard">
              📥
            </button>
            <div id="export-menu" class="export-dropdown">
              <div class="export-dropdown-header">Export Dashboard</div>
              <button data-export="png" class="export-opt">
                <span class="export-opt-icon">📷</span>
                <span class="export-opt-label">Screenshot (PNG)</span>
              </button>
              <button data-export="pdf" class="export-opt">
                <span class="export-opt-icon">📄</span>
                <span class="export-opt-label">PDF Report</span>
              </button>
              <div class="export-dropdown-divider"></div>
              <button data-export="json" class="export-opt">
                <span class="export-opt-icon">📊</span>
                <span class="export-opt-label">Download JSON</span>
              </button>
              <button data-export="csv" class="export-opt">
                <span class="export-opt-icon">📋</span>
                <span class="export-opt-label">Download CSV</span>
              </button>
            </div>
          </li>
          <li>
            <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
              <span class="theme-icon-dark">🌙</span>
              <span class="theme-icon-light">☀️</span>
            </button>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</header>
